  <text x="512" y="318" text-anchor="middle" font-size="27.5" fill="#172033">① d=√Σ(x−x')² 全部训练样本</text>
  <line x1="712" y1="308" x2="825" y2="308" stroke="#64748b" stroke-width="6" marker-end="url(#a)"/>
