<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 150" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="780" height="150" fill="#f8fafc" rx="8"/>
  <!-- Training -->
  <text x="25" y="22" font-size="13" font-weight="600" fill="#5b6475">训练：存储到 kd-tree</text>
  <rect x="10" y="34" width="140" height="40" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">训练集 → kd-tree</text>
  <line x1="150" y1="54" x2="180" y2="54" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="185" y="34" width="100" height="40" rx="6" fill="#99f6e4" stroke="#94a3b8"/>
  <text x="235" y="58" text-anchor="middle" font-size="11" fill="#172033">存储完成</text>
  <!-- Prediction flow -->
  <text x="25" y="98" font-size="13" font-weight="600" fill="#172033">预测：</text>
  <ellipse cx="55" cy="123" rx="18" ry="14" fill="#fde68a" stroke="#e2e8f0"/>
  <text x="55" y="127" text-anchor="middle" font-size="9" fill="#172033">x</text>
  <line x1="73" y1="123" x2="120" y2="123" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="125" y="108" width="160" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="205" y="127" text-anchor="middle" font-size="11" fill="#172033">① d=√Σ(x−x')² 全部训练样本</text>
  <line x1="285" y1="123" x2="330" y2="123" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="335" y="108" width="120" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="395" y="127" text-anchor="middle" font-size="11" fill="#172033">② 取K=5近邻</text>
  <line x1="455" y1="123" x2="500" y2="123" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="505" y="108" width="130" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="570" y="127" text-anchor="middle" font-size="11" fill="#172033">③ 5邻居标签投票</text>
  <line x1="635" y1="123" x2="680" y2="123" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="685" y="108" width="80" height="30" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="725" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">91.78%</text>
</svg>
