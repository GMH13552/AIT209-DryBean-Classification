<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230" font-family="system-ui,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/></marker>
  </defs>
  <rect width="820" height="230" fill="#f8fafc" rx="8"/>
  <text x="30" y="24" font-size="16" font-weight="700" fill="#172033">KNN：懒惰学习 — 训练 = 存储，预测 = 查 K 近邻 + 投票</text>
  <!-- Training -->
  <rect x="20" y="42" width="160" height="50" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="100" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">训练数据</text>
  <text x="100" y="80" text-anchor="middle" font-size="11" fill="#5b6475">9,527条×16维 → kd-tree</text>
  <line x1="180" y1="67" x2="225" y2="67" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>
  <rect x="230" y="42" width="120" height="50" rx="6" fill="#99f6e4" stroke="#94a3b8"/>
  <text x="290" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">kd-tree</text>
  <text x="290" y="80" text-anchor="middle" font-size="11" fill="#5b6475">空间索引</text>
  <!-- Prediction -->
  <line x1="290" y1="92" x2="290" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="30" y="130" font-size="14" font-weight="600" fill="#172033">预测流程（每条新样本）：</text>
  <rect x="20" y="142" width="150" height="70" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="95" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#172033">① 计算距离</text>
  <text x="95" y="182" text-anchor="middle" font-size="10" fill="#5b6475">d=√Σ(xⱼ−x'ⱼ)²</text>
  <text x="95" y="198" text-anchor="middle" font-size="10" fill="#5b6475">vs 全部9527样本</text>
  <line x1="170" y1="177" x2="215" y2="177" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="220" y="142" width="150" height="70" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="295" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#172033">② 取K=5近邻</text>
  <text x="295" y="182" text-anchor="middle" font-size="10" fill="#5b6475">距离最小的5个</text>
  <text x="295" y="198" text-anchor="middle" font-size="10" fill="#5b6475">训练样本</text>
  <line x1="370" y1="177" x2="415" y2="177" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="420" y="142" width="150" height="70" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="495" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#172033">③ 多数投票</text>
  <text x="495" y="182" text-anchor="middle" font-size="10" fill="#5b6475">argmax Σ I(y=c)</text>
  <text x="495" y="198" text-anchor="middle" font-size="10" fill="#5b6475">5个邻居投票</text>
  <line x1="570" y1="177" x2="615" y2="177" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="620" y="152" width="80" height="50" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="660" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">91.78%</text>
  <!-- Note -->
  <text x="30" y="222" font-size="11" fill="#6366f1">特点：零训练时间（不拟合任何参数），每次推理需计算全部训练样本距离 → 推理慢 (517ms)</text>
</svg>
