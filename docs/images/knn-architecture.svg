<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 375" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="375" fill="#f8fafc" rx="50"/>
