<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 200" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="18" markerHeight="12" refX="18" refY="6" orient="auto"><path d="M0,0 L18,6 L0,12 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="200" fill="#f8fafc" rx="20"/>
  
  <text x="30" y="40" font-size="24" font-weight="600" fill="#5b6475">训练：存储到 kd-tree（无参数，零训练时间）</text>
  
