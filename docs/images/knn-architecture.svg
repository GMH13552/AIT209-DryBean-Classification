  <ellipse cx="55" cy="180" rx="28" ry="24" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="55" y="186" text-anchor="middle" font-size="16" fill="#172033">x</text>
  
  <line x1="83" y1="180" x2="180" y2="180" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
