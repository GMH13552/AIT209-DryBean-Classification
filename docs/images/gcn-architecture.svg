<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="780" height="350" fill="#f8fafc" rx="8"/>
  <!-- Phase 1 -->
  <text x="25" y="24" font-size="15" font-weight="700" fill="#172033">Phase 1 · 建图（训练时一次性完成）</text>
  <rect x="20" y="40" width="155" height="72" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="97" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#172033">特征矩阵 X</text>
  <text x="97" y="82" text-anchor="middle" font-size="11" fill="#5b6475">n × 16, 标准化</text>
  <text x="97" y="98" text-anchor="middle" font-size="10" fill="#5b6475">面积,周长,...</text>
  <line x1="175" y1="76" x2="220" y2="76" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>
  <rect x="225" y="45" width="130" height="62" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="290" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#172033">KNN (k=10)</text>
  <text x="290" y="86" text-anchor="middle" font-size="11" fill="#5b6475">欧氏距离建边</text>
  <text x="290" y="100" text-anchor="middle" font-size="10" fill="#5b6475">每个节点→10条边</text>
  <line x1="355" y1="76" x2="400" y2="76" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>
  <!-- Graph viz -->
  <rect x="405" y="35" width="175" height="82" rx="6" fill="#99f6e4" stroke="#94a3b8"/>
  <circle cx="440" cy="62" r="5" fill="#6366f1"/><circle cx="465" cy="55" r="5" fill="#6366f1"/><circle cx="490" cy="68" r="5" fill="#6366f1"/>
  <circle cx="455" cy="85" r="5" fill="#6366f1"/><circle cx="480" cy="92" r="5" fill="#6366f1"/><circle cx="515" cy="78" r="5" fill="#93c5fd"/>
  <line x1="445" y1="62" x2="460" y2="55" stroke="#94a3b8" stroke-width="1"/><line x1="470" y1="55" x2="485" y2="68" stroke="#94a3b8" stroke-width="1"/><line x1="460" y1="85" x2="475" y2="92" stroke="#94a3b8" stroke-width="1"/><line x1="485" y1="85" x2="510" y2="78" stroke="#94a3b8" stroke-width="1"/><line x1="495" y1="68" x2="510" y2="78" stroke="#94a3b8" stroke-width="1"/>
  <text x="545" y="62" font-size="10" fill="#5b6475">● 训练节点</text>
  <circle cx="555" cy="82" r="4" fill="#93c5fd"/><text x="565" y="86" font-size="10" fill="#5b6475">测试节点</text>
  <text x="493" y="110" text-anchor="middle" font-size="10" fill="#6366f1">边=特征相似</text>
  <!-- Phase 2 -->
  <text x="25" y="155" font-size="15" font-weight="700" fill="#172033">Phase 2 · 前向传播（仅 1,543 参数）</text>
  <line x1="198" y1="160" x2="198" y2="185" stroke="#6366f1" stroke-width="2"/>
  <!-- Layer 1 box -->
  <rect x="20" y="190" width="170" height="72" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="105" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#172033">GCN Layer 1</text>
  <text x="105" y="234" text-anchor="middle" font-size="10" fill="#5b6475">H₁ = σ(D⁻½AD⁻½ X W₁)</text>
  <text x="105" y="250" text-anchor="middle" font-size="10" fill="#5b6475">16 → 64, ReLU</text>
  <line x1="190" y1="226" x2="235" y2="226" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="240" y="200" width="95" height="52" rx="6" fill="#fecaca" stroke="#94a3b8"/>
  <text x="287" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">Dropout</text>
  <text x="287" y="240" text-anchor="middle" font-size="10" fill="#5b6475">p=0.3</text>
  <line x1="335" y1="226" x2="380" y2="226" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="385" y="190" width="170" height="72" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="470" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#172033">GCN Layer 2</text>
  <text x="470" y="234" text-anchor="middle" font-size="10" fill="#5b6475">H₂ = D⁻½AD⁻½ H₁ W₂</text>
  <text x="470" y="250" text-anchor="middle" font-size="10" fill="#5b6475">64 → 7, 输出logits</text>
  <line x1="555" y1="226" x2="600" y2="226" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="605" y="198" width="95" height="56" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="652" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">Softmax</text>
  <text x="652" y="242" text-anchor="middle" font-size="10" fill="#5b6475">→ 预测类别</text>
  <!-- Parameter panel -->
  <rect x="20" y="285" width="740" height="54" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-dasharray="6 5"/>
  <text x="35" y="304" font-size="11" font-weight="600" fill="#172033">参数明细：</text>
  <text x="120" y="304" font-size="10" fill="#5b6475">W₁(16×64=1024) </text><text x="240" y="304" font-size="10" fill="#5b6475">b₁(64) </text><text x="300" y="304" font-size="10" fill="#5b6475">W₂(64×7=448) </text><text x="420" y="304" font-size="10" fill="#5b6475">b₂(7) </text><text x="470" y="304" font-size="10" fill="#5b6475">总计 1,543</text>
  <text x="35" y="326" font-size="10" fill="#6366f1">推理：新样本→KNN找10邻居→邻居特征×W₁→聚合→ReLU→×W₂→Softmax。GCN 学的是"如何利用邻居特征"，而非简单数标签。</text>
</svg>
