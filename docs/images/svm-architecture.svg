<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 195" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="780" height="195" fill="#f8fafc" rx="8"/>
  <!-- Top flow -->
  <rect x="10" y="10" width="130" height="38" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="75" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">标准化特征</text>
  <line x1="140" y1="29" x2="175" y2="29" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="180" y="10" width="140" height="38" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="250" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">RBF核 → 高维映射</text>
  <line x1="320" y1="29" x2="355" y2="29" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
