  <text x="437" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">软间隔优化 (C=10)</text>
  <line x1="515" y1="29" x2="550" y2="29" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="555" y="8" width="85" height="42" rx="6" fill="#99f6e4" stroke="#94a3b8"/>
  <text x="597" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#172033">21个SVM</text>
  <text x="597" y="42" text-anchor="middle" font-size="9" fill="#5b6475">C(7,2)=21</text>
  <!-- OVO -->
  <text x="20" y="75" font-size="12" font-weight="600" fill="#172033">多分类：一对一 (OVO) —  21对组合，每对训练一个二分类SVM</text>
  <rect x="10" y="85" width="760" height="35" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <circle cx="45" cy="103" r="5" fill="#93c5fd"/><text x="54" y="108" font-size="9" fill="#5b6475">BvB</text>
  <circle cx="115" cy="103" r="5" fill="#93c5fd"/><text x="124" y="108" font-size="9" fill="#5b6475">BvC</text>
  <circle cx="185" cy="103" r="5" fill="#93c5fd"/><text x="194" y="108" font-size="9" fill="#5b6475">BvD</text>
  <circle cx="255" cy="103" r="5" fill="#93c5fd"/><text x="264" y="108" font-size="9" fill="#5b6475">CvD</text>
  <circle cx="325" cy="103" r="5" fill="#93c5fd"/><text x="334" y="108" font-size="9" fill="#5b6475">CvH</text>
  <circle cx="395" cy="103" r="5" fill="#93c5fd"/><text x="404" y="108" font-size="9" fill="#5b6475">DvH</text>
  <circle cx="465" cy="103" r="5" fill="#93c5fd"/><text x="474" y="108" font-size="9" fill="#5b6475">DvSe</text>
  <text x="540" y="108" font-size="9" fill="#5b6475">···共21个</text>
  <!-- Prediction -->
  <text x="20" y="152" font-size="12" font-weight="600" fill="#172033">预测：</text>
  <ellipse cx="55" cy="175" rx="16" ry="12" fill="#fde68a" stroke="#e2e8f0"/>
  <text x="55" y="179" text-anchor="middle" font-size="9" fill="#172033">x</text>
  <line x1="71" y1="175" x2="120" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="125" y="160" width="155" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="202" y="179" text-anchor="middle" font-size="11" fill="#172033">21个分类器投票</text>
  <line x1="280" y1="175" x2="320" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="325" y="160" width="130" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="390" y="179" text-anchor="middle" font-size="11" fill="#172033">票数最多=预测</text>
  <line x1="455" y1="175" x2="500" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="505" y="162" width="70" height="26" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="540" y="179" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">93.31%</text>
</svg>
