<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 310" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="18" markerHeight="12" refX="18" refY="6" orient="auto"><path d="M0,0 L18,6 L0,12 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="310" fill="#f8fafc" rx="20"/>
  
  <!-- Training -->
  <text x="30" y="36" font-size="24" font-weight="700" fill="#172033">训练：RBF 核映射 → 软间隔优化 → 21 个二分类 SVM</text>
  
  <rect x="20" y="55" width="230" height="50" rx="14" fill="#bfdbfe" stroke="#94a3b8" stroke-width="2"/>
  <text x="135" y="86" text-anchor="middle" font-size="19" font-weight="600" fill="#172033">标准化特征 X</text>
  
  <line x1="250" y1="80" x2="330" y2="80" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  <rect x="340" y="55" width="260" height="50" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="86" text-anchor="middle" font-size="19" font-weight="600" fill="#172033">RBF 核 → 高维映射</text>
  
  <line x1="600" y1="80" x2="680" y2="80" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  <rect x="690" y="55" width="280" height="50" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="830" y="86" text-anchor="middle" font-size="19" font-weight="600" fill="#172033">软间隔优化 (C=10)</text>
  
  <line x1="970" y1="80" x2="1050" y2="80" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  <rect x="1060" y="48" width="170" height="60" rx="14" fill="#99f6e4" stroke="#94a3b8" stroke-width="2"/>
  <text x="1145" y="72" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">21 个 SVM</text>
  <text x="1145" y="96" text-anchor="middle" font-size="15" fill="#5b6475">C(7,2)=21 对</text>
  
  <!-- OVO -->
  <rect x="20" y="125" width="1910" height="48" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8 6"/>
  <circle cx="55" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="75" y="156" font-size="16" fill="#334155">BvB</text>
  <circle cx="160" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="180" y="156" font-size="16" fill="#334155">BvC</text>
  <circle cx="265" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="285" y="156" font-size="16" fill="#334155">BvD</text>
  <circle cx="370" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="390" y="156" font-size="16" fill="#334155">CvD</text>
  <circle cx="475" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="495" y="156" font-size="16" fill="#334155">CvH</text>
  <circle cx="580" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="600" y="156" font-size="16" fill="#334155">DvH</text>
  <circle cx="685" cy="150" r="12" fill="#93c5fd" stroke="#818cf8" stroke-width="1"/>
  <text x="705" y="156" font-size="16" fill="#334155">DvSe</text>
  <text x="810" y="156" font-size="16" fill="#5b6475">··· 共 21 对，每对一个二分类器，预测时 21 个分类器投票</text>
  
  <!-- Prediction -->
  <text x="30" y="220" font-size="24" font-weight="700" fill="#172033">预测：</text>
  
  <ellipse cx="55" cy="275" rx="28" ry="24" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="55" y="281" text-anchor="middle" font-size="16" fill="#172033">x</text>
  
  <line x1="83" y1="275" x2="180" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <rect x="190" y="252" width="300" height="46" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="340" y="280" text-anchor="middle" font-size="18" fill="#172033">21 个分类器各自投票</text>
  
  <line x1="490" y1="275" x2="580" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <rect x="590" y="252" width="220" height="46" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="700" y="280" text-anchor="middle" font-size="18" fill="#172033">票数最多 = 预测</text>
  
  <line x1="810" y1="275" x2="910" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <rect x="920" y="256" width="130" height="38" rx="14" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="985" y="280" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">93.31%</text>
</svg>
