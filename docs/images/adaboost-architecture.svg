<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 170" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="780" height="170" fill="#f8fafc" rx="8"/>
  <!-- Training loop -->
  <text x="20" y="22" font-size="13" font-weight="600" fill="#172033">训练：50 轮迭代，每轮调整样本权重</text>
  <rect x="10" y="34" width="100" height="32" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="60" y="54" text-anchor="middle" font-size="11" fill="#172033">w₁(i)=1/n</text>
  <line x1="110" y1="50" x2="145" y2="50" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Iteration -->
  <rect x="150" y="30" width="220" height="68" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="260" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#172033">第 t 轮 (t=1..50)</text>
  <text x="160" y="66" font-size="9" fill="#5b6475">① 加权训练弱学习器 hₜ (tree, depth=3)</text>
  <text x="160" y="80" font-size="9" fill="#5b6475">② εₜ=错误率 → αₜ=½ln((1-εₜ)/εₜ)</text>
  <text x="160" y="94" font-size="9" fill="#6366f1">③ wₜ₊₁(i)=wₜ(i)·exp(-αₜ·yᵢ·hₜ(xᵢ))</text>
  <!-- Loop arrow -->
  <path d="M370,64 L400,64 L400,100 L180,100 L180,94" stroke="#6366f1" stroke-width="1" fill="none" marker-end="url(#a)"/>
  <text x="410" y="90" font-size="8" fill="#6366f1">循环</text>
  <!-- Prediction -->
  <text x="20" y="130" font-size="13" font-weight="600" fill="#172033">预测：50弱学习器 → 加权投票</text>
  <ellipse cx="50" cy="153" rx="14" ry="11" fill="#fde68a" stroke="#e2e8f0"/><text x="50" y="157" text-anchor="middle" font-size="8" fill="#172033">x</text>
  <line x1="64" y1="153" x2="110" y2="153" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="130" cy="153" r="8" fill="#c7d2fe" stroke="#818cf8"/><circle cx="150" cy="153" r="8" fill="#c7d2fe" stroke="#818cf8"/><circle cx="170" cy="153" r="8" fill="#c7d2fe" stroke="#818cf8"/>
  <text x="188" y="157" font-size="9" fill="#5b6475">···</text>
  <line x1="210" y1="153" x2="250" y2="153" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="255" y="138" width="190" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="350" y="157" text-anchor="middle" font-size="10" fill="#172033">H(x)=sign(Σαₜ·hₜ(x))</text>
  <line x1="445" y1="153" x2="485" y2="153" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="490" y="142" width="65" height="22" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="522" y="157" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">89.84%</text>
</svg>
