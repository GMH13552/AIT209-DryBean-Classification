<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 380" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="18" markerHeight="12" refX="18" refY="6" orient="auto"><path d="M0,0 L18,6 L0,12 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="380" fill="#f8fafc" rx="20"/>
  
  <!-- Title -->
  <text x="30" y="50" font-size="30" font-weight="700" fill="#172033">训练：50 轮迭代，每轮调整样本权重</text>
  
  <!-- Init -->
  <rect x="20" y="75" width="220" height="65" rx="16" fill="#bfdbfe" stroke="#94a3b8" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-size="22" font-weight="600" fill="#172033">w₁(i) = 1/n</text>
  
  <line x1="240" y1="108" x2="340" y2="108" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  
  <!-- Iteration box -->
  <rect x="350" y="60" width="580" height="150" rx="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="640" y="92" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">第 t 轮 (t = 1, 2, ..., 50)</text>
  <text x="370" y="128" font-size="20" fill="#334155">① 在加权训练集上训练弱学习器 hₜ（决策树，depth=3）</text>
  <text x="370" y="158" font-size="20" fill="#334155">② 计算加权错误率 εₜ → 分类器权重 αₜ = ½·ln((1−εₜ)/εₜ)</text>
  <text x="370" y="188" font-size="20" fill="#6366f1">③ 更新样本权重：wₜ₊₁(i) = wₜ(i)·exp(−αₜ·yᵢ·hₜ(xᵢ))</text>
  
  <!-- Loop arrow -->
  <path d="M930,135 L970,135 L970,245 L450,245 L450,225" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#a)"/>
  <text x="980" y="200" font-size="16" fill="#6366f1">错分样本</text>
  <text x="980" y="220" font-size="16" fill="#6366f1">权重 ↑</text>
  
  <!-- Prediction title -->
  <text x="30" y="285" font-size="30" font-weight="700" fill="#172033">预测：50 个弱学习器 → 加权投票</text>
  
  <!-- Flow -->
  <ellipse cx="50" cy="340" rx="30" ry="25" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="50" y="346" text-anchor="middle" font-size="16" font-weight="600" fill="#172033">x</text>
  
  <line x1="80" y1="340" x2="150" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <!-- Weak learners cluster -->
  <circle cx="210" cy="340" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="210" y="346" text-anchor="middle" font-size="14" fill="#172033">1</text>
  <circle cx="270" cy="340" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="270" y="346" text-anchor="middle" font-size="14" fill="#172033">2</text>
  <circle cx="330" cy="340" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="330" y="346" text-anchor="middle" font-size="14" fill="#172033">3</text>
  <text x="380" y="346" font-size="22" fill="#5b6475">··· 50 个弱学习器</text>
  
  <line x1="560" y1="340" x2="630" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <!-- Weighted vote -->
  <rect x="640" y="305" width="340" height="70" rx="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="810" y="332" text-anchor="middle" font-size="20" font-weight="600" fill="#172033">加权投票</text>
  <text x="810" y="358" text-anchor="middle" font-size="16" fill="#334155">H(x) = sign( Σ αₜ · hₜ(x) )</text>
  
  <line x1="980" y1="340" x2="1060" y2="340" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <!-- Output -->
  <rect x="1070" y="312" width="130" height="55" rx="16" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="1135" y="348" text-anchor="middle" font-size="28" font-weight="700" fill="#172033">89.84%</text>
</svg>
