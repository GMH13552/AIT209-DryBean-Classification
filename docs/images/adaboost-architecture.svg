<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 425" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="425" fill="#f8fafc" rx="50"/>
  <!-- Training loop -->
  <text x="50" y="55" font-size="32.5" font-weight="600" fill="#172033">训练：50 轮迭代，每轮调整样本权重</text>
  <rect x="25" y="85" width="250" height="80" rx="38" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="150" y="135" text-anchor="middle" font-size="27.5" fill="#172033">w₁(i)=1/n</text>
  <line x1="275" y1="125" x2="362" y2="125" stroke="#6366f1" stroke-width="6" marker-end="url(#a)"/>
  <!-- Iteration -->
  <rect x="375" y="75" width="550" height="170" rx="38" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="650" y="120" text-anchor="middle" font-size="27.5" font-weight="600" fill="#172033">第 t 轮 (t=1..50)</text>
  <text x="400" y="165" font-size="22.5" fill="#5b6475">① 加权训练弱学习器 hₜ (tree, depth=3)</text>
  <text x="400" y="200" font-size="22.5" fill="#5b6475">② εₜ=错误率 → αₜ=½ln((1-εₜ)/εₜ)</text>
  <text x="400" y="235" font-size="22.5" fill="#6366f1">③ wₜ₊₁(i)=wₜ(i)·exp(-αₜ·yᵢ·hₜ(xᵢ))</text>
  <!-- Loop arrow -->
  <path d="M370,64 L400,64 L400,100 L180,100 L180,94" stroke="#6366f1" stroke-width="4" fill="none" marker-end="url(#a)"/>
  <text x="1025" y="225" font-size="20.0" fill="#6366f1">循环</text>
  <!-- Prediction -->
  <text x="50" y="325" font-size="32.5" font-weight="600" fill="#172033">预测：50弱学习器 → 加权投票</text>
  <ellipse cx="312" cy="955" rx="88" ry="70" fill="#fde68a" stroke="#e2e8f0"/><text x="125" y="392" text-anchor="middle" font-size="20.0" fill="#172033">x</text>
  <line x1="160" y1="382" x2="275" y2="382" stroke="#64748b" stroke-width="6" marker-end="url(#a)"/>
  <circle cx="812" cy="955" r="20" fill="#c7d2fe" stroke="#818cf8"/><circle cx="938" cy="955" r="20" fill="#c7d2fe" stroke="#818cf8"/><circle cx="1062" cy="955" r="20" fill="#c7d2fe" stroke="#818cf8"/>
  <text x="470" y="392" font-size="22.5" fill="#5b6475">···</text>
  <line x1="525" y1="382" x2="625" y2="382" stroke="#64748b" stroke-width="6" marker-end="url(#a)"/>
  <rect x="638" y="345" width="475" height="75" rx="38" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="875" y="392" text-anchor="middle" font-size="25.0" fill="#172033">H(x)=sign(Σαₜ·hₜ(x))</text>
  <line x1="1112" y1="382" x2="1212" y2="382" stroke="#64748b" stroke-width="6" marker-end="url(#a)"/>
  <rect x="1225" y="355" width="162" height="55" rx="38" fill="#fde68a" stroke="#94a3b8"/>
  <text x="1305" y="392" text-anchor="middle" font-size="32.5" font-weight="700" fill="#172033">89.84%</text>
</svg>
