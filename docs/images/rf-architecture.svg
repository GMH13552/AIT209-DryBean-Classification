<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 195" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#6366f1"/></marker></defs>
  <rect width="780" height="195" fill="#f8fafc" rx="8"/>
  <!-- Top -->
  <text x="20" y="22" font-size="13" font-weight="600" fill="#172033">训练：Bootstrap 采样 → 100棵树并行训练 → 每棵随机选 √16=4 特征分裂</text>
  <rect x="10" y="36" width="120" height="40" rx="6" fill="#bfdbfe" stroke="#94a3b8"/>
  <text x="70" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#172033">训练集 (9527条)</text>
  <!-- Bootstrap → samples -->
  <line x1="130" y1="45" x2="175" y2="45" stroke="#6366f1" stroke-width="1.5"/><line x1="130" y1="56" x2="175" y2="56" stroke="#6366f1" stroke-width="1.5"/><line x1="130" y1="67" x2="175" y2="67" stroke="#6366f1" stroke-width="1.5"/>
  <text x="152" y="35" font-size="9" fill="#6366f1">Bootstrap</text>
  <!-- Samples → trees -->
  <rect x="180" y="35" width="80" height="18" rx="3" fill="#e2e8f0"/><text x="220" y="48" text-anchor="middle" font-size="9" fill="#172033">子集₁</text><line x1="260" y1="44" x2="290" y2="44" stroke="#64748b" stroke-width="1.5"/>
  <rect x="180" y="56" width="80" height="18" rx="3" fill="#e2e8f0"/><text x="220" y="69" text-anchor="middle" font-size="9" fill="#172033">子集₂</text><line x1="260" y1="65" x2="290" y2="65" stroke="#64748b" stroke-width="1.5"/>
  <rect x="180" y="77" width="80" height="18" rx="3" fill="#e2e8f0"/><text x="220" y="90" text-anchor="middle" font-size="9" fill="#172033">子集₁₀₀</text><line x1="260" y1="86" x2="290" y2="86" stroke="#64748b" stroke-width="1.5"/>
  <!-- Trees with circles -->
  <circle cx="330" cy="44" r="12" fill="#c7d2fe" stroke="#818cf8"/><text x="330" y="48" text-anchor="middle" font-size="9" fill="#172033">T₁</text>
  <circle cx="330" cy="65" r="12" fill="#c7d2fe" stroke="#818cf8"/><text x="330" y="69" text-anchor="middle" font-size="9" fill="#172033">T₂</text>
  <circle cx="330" cy="86" r="12" fill="#c7d2fe" stroke="#818cf8"/><text x="330" y="90" text-anchor="middle" font-size="9" fill="#172033">T₁₀₀</text>
  <text x="360" y="48" font-size="9" fill="#5b6475">depth=12, Gini 分裂</text>
  <text x="360" y="68" font-size="9" fill="#5b6475">随机选4特征/节点</text>
  <text x="360" y="90" font-size="9" fill="#5b6475">OOB 37%天然验证</text>
  <!-- Prediction -->
  <text x="20" y="140" font-size="13" font-weight="600" fill="#172033">预测：</text>
  <ellipse cx="50" cy="165" rx="14" ry="11" fill="#fde68a" stroke="#e2e8f0"/><text x="50" y="169" text-anchor="middle" font-size="8" fill="#172033">x</text>
  <line x1="64" y1="165" x2="110" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="140" cy="165" r="10" fill="#c7d2fe" stroke="#818cf8"/><circle cx="170" cy="165" r="10" fill="#c7d2fe" stroke="#818cf8"/><circle cx="200" cy="165" r="10" fill="#c7d2fe" stroke="#818cf8"/>
  <text x="220" y="169" font-size="9" fill="#5b6475">... 100棵树</text>
  <line x1="290" y1="165" x2="330" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="335" y="150" width="120" height="30" rx="6" fill="#c7d2fe" stroke="#94a3b8"/>
  <text x="395" y="169" text-anchor="middle" font-size="11" fill="#172033">多数投票</text>
  <line x1="455" y1="165" x2="495" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="500" y="153" width="70" height="24" rx="6" fill="#fde68a" stroke="#94a3b8"/>
  <text x="535" y="169" text-anchor="middle" font-size="13" font-weight="700" fill="#172033">92.36%</text>
</svg>
