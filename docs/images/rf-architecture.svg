<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 270" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="18" markerHeight="12" refX="18" refY="6" orient="auto"><path d="M0,0 L18,6 L0,12 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="270" fill="#f8fafc" rx="20"/>
  
  <text x="30" y="36" font-size="24" font-weight="700" fill="#172033">训练：Bootstrap 采样 → 100 棵树并行训练，每棵随机选 √16=4 特征分裂（Gini 不纯度）</text>
  
  <!-- Bootstrap -->
  <rect x="20" y="55" width="200" height="50" rx="14" fill="#bfdbfe" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="86" text-anchor="middle" font-size="18" font-weight="600" fill="#172033">训练集 (9527条)</text>
  
  <line x1="220" y1="65" x2="340" y2="65" stroke="#6366f1" stroke-width="2"/>
  <line x1="220" y1="80" x2="340" y2="80" stroke="#6366f1" stroke-width="2"/>
  <line x1="220" y1="95" x2="340" y2="95" stroke="#6366f1" stroke-width="2" marker-end="url(#a)"/>
  <text x="260" y="50" font-size="14" fill="#6366f1">Bootstrap 有放回采样</text>
  
  <!-- 3 subset rows -->
  <rect x="350" y="52" width="120" height="22" rx="8" fill="#e2e8f0"/>
  <text x="410" y="68" text-anchor="middle" font-size="14" fill="#172033">子集₁  (~63%)</text>
  
  <rect x="350" y="80" width="120" height="22" rx="8" fill="#e2e8f0"/>
  <text x="410" y="96" text-anchor="middle" font-size="14" fill="#172033">子集₂  (~63%)</text>
  
  <rect x="350" y="108" width="120" height="22" rx="8" fill="#e2e8f0"/>
  <text x="410" y="124" text-anchor="middle" font-size="14" fill="#172033">子集₁₀₀</text>
  
  <!-- Trees as circles -->
  <line x1="470" y1="63" x2="560" y2="63" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="91" x2="560" y2="91" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="119" x2="560" y2="119" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  
  <circle cx="600" cy="63" r="22" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="600" y="70" text-anchor="middle" font-size="16" fill="#172033">T₁</text>
  <circle cx="600" cy="91" r="22" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="600" y="98" text-anchor="middle" font-size="16" fill="#172033">T₂</text>
  <circle cx="600" cy="119" r="22" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="600" y="126" text-anchor="middle" font-size="16" fill="#172033">T₁₀₀</text>
  
  <text x="650" y="68" font-size="16" fill="#5b6475">depth=12, Gini 分裂</text>
  <text x="650" y="96" font-size="16" fill="#5b6475">每节点随机选4特征</text>
  <text x="650" y="124" font-size="16" fill="#5b6475">OOB 37% 天然验证</text>
  
  <!-- Prediction -->
  <text x="30" y="190" font-size="24" font-weight="700" fill="#172033">预测：100 棵树 → 多数投票</text>
  
  <ellipse cx="55" cy="240" rx="28" ry="24" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="55" y="246" text-anchor="middle" font-size="16" fill="#172033">x</text>
  
  <line x1="83" y1="240" x2="180" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <circle cx="230" cy="240" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="230" y="246" text-anchor="middle" font-size="14" fill="#172033">1</text>
  <circle cx="280" cy="240" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="280" y="246" text-anchor="middle" font-size="14" fill="#172033">2</text>
  <circle cx="330" cy="240" r="20" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="330" y="246" text-anchor="middle" font-size="14" fill="#172033">3</text>
  <text x="380" y="246" font-size="22" fill="#5b6475">··· 100 棵树</text>
  
  <line x1="570" y1="240" x2="660" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <rect x="670" y="215" width="230" height="50" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="785" y="246" text-anchor="middle" font-size="20" font-weight="600" fill="#172033">多数投票</text>
  
  <line x1="900" y1="240" x2="1000" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  
  <rect x="1010" y="220" width="130" height="40" rx="14" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="1075" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#172033">92.36%</text>
</svg>
