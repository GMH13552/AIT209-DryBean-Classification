<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 520" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="16" markerHeight="10" refX="16" refY="5" orient="auto"><path d="M0,0 L16,5 L0,10 Z" fill="#6366f1"/></marker></defs>
  <rect width="1950" height="520" fill="#f8fafc" rx="20"/>
  
  <!-- main.py at top -->
  <rect x="600" y="20" width="400" height="70" rx="16" fill="#6366f1" stroke="#4338ca" stroke-width="2"/>
  <text x="800" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">main.py</text>
  <text x="800" y="76" text-anchor="middle" font-size="16" fill="#c7d2fe">总调度中心</text>
  
  <!-- Lines down -->
  <line x1="710" y1="90" x2="300" y2="170" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  <line x1="800" y1="90" x2="800" y2="170" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  <line x1="890" y1="90" x2="1300" y2="170" stroke="#6366f1" stroke-width="3" marker-end="url(#a)"/>
  
  <!-- data_loader -->
  <rect x="100" y="180" width="380" height="100" rx="14" fill="#bfdbfe" stroke="#94a3b8" stroke-width="2"/>
  <text x="290" y="215" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">data_loader.py</text>
  <text x="290" y="242" text-anchor="middle" font-size="18" fill="#334155">数据加载层</text>
  <text x="290" y="265" text-anchor="middle" font-size="14" fill="#5b6475">加载 CSV · 标签映射表</text>
  
  <!-- preprocess -->
  <rect x="600" y="180" width="400" height="100" rx="14" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="800" y="215" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">preprocess.py</text>
  <text x="800" y="242" text-anchor="middle" font-size="18" fill="#334155">预处理层</text>
  <text x="800" y="265" text-anchor="middle" font-size="14" fill="#5b6475">①标签清洗 ②Solidity ③Compact ④缺失填充 ⑤标准化</text>
  
  <!-- Training -->
  <rect x="1120" y="170" width="380" height="120" rx="14" fill="#99f6e4" stroke="#94a3b8" stroke-width="2"/>
  <text x="1310" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">训练 &amp; 评估</text>
  <text x="1310" y="225" text-anchor="middle" font-size="16" fill="#334155">main.py + gnn.py</text>
  <circle cx="1180" cy="258" r="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
  <text x="1208" y="263" font-size="15" fill="#334155">KNN</text>
  <circle cx="1260" cy="258" r="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
  <text x="1288" y="263" font-size="15" fill="#334155">SVM</text>
  <circle cx="1340" cy="258" r="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
  <text x="1368" y="263" font-size="15" fill="#334155">RF</text>
  <circle cx="1420" cy="258" r="16" fill="#c7d2fe" stroke="#818cf8" stroke-width="1"/>
  <text x="1448" y="263" font-size="15" fill="#334155">Ada</text>
  <circle cx="1300" cy="278" r="16" fill="#fde68a" stroke="#cbb95e" stroke-width="1"/>
  <text x="1328" y="283" font-size="15" fill="#334155">GCN</text>
  
  <!-- Output arrow -->
  <path d="M1310,290 L1310,340 L800,340 L800,370" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#a)"/>
  
  <!-- results -->
  <rect x="560" y="380" width="480" height="70" rx="14" fill="#fde68a" stroke="#cbb95e" stroke-width="2"/>
  <text x="800" y="412" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">results/model_comparison.csv</text>
  <text x="800" y="438" text-anchor="middle" font-size="15" fill="#5b6475">输出：模型精度排名表 · F1 · 过拟合度 · 推理速度</text>
  
  <!-- Data flow arrows -->
  <text x="490" y="240" font-size="14" fill="#6366f1">→</text>
  <text x="1010" y="240" font-size="14" fill="#6366f1">→</text>
</svg>
